    <script>
      function myTag(strings, age) {
        console.log(strings);

        // age = new Date().getFullYear() - 1995;

        if (age < 30) {
          comment = "もうすぐ30です";
        }
        if (age === 30) {
          comment = "ちょうど30";
        }
        if (age > 30) {
          comment = "オーバー30でやんす";
        }
        return strings[0] + age + strings[1] + comment;
      }
