<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO(JS)</title>
    <style>
      ul {
        border: 1px solid #000;
      }
      li {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class=""><input type="text" placeholder="TODOを入力" /><button class="add">追加</button></div>
    <div class="">
      <p>未完了のTODO</p>
      <ul class="incomplete-list">
        <li>
          <p>TODOです</p>
          <button class="complete">完了</button>
          <button class="delete">削除</button>
        </li>
      </ul>
    </div>
    <div class="">
      <p>完了のTODO</p>
      <ul class="complete-list">
        <li>
          <p>TODOでした</p>
          <button class="return">戻す</button>
        </li>
      </ul>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
